blueprint:
  name: OFS - Notify Print on Complete
  description: Send notification when a print completes
  domain: automation

  input:
    print_status_sensor:
      name: Print status sensor
      selector:
        entity:
          domain: sensor

    print_time_sensor:
      name: Print time sensor (minutes)
      selector:
        entity:
          domain: sensor

    camera_entity:
      name: Camera
      selector:
        entity:
          domain: camera

    notify_device:
      name: Mobile device
      description: Device to notify
      selector:
        device:
          integration: mobile_app

trigger:
  - platform: state
    entity_id: !input print_status_sensor
    to: "Complete"

condition: []

variables:
  print_time_entity: !input print_time_sensor
  camera_entity_id: !input camera_entity

action:
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: "Print Complete!"
    message: >-
      {% set total_seconds =
      (states(print_time_entity) | float * 60) | int %}
      {% set h = (total_seconds // 3600) %}
      {% set m = (total_seconds % 3600) // 60 %}
      {% set s = total_seconds % 60 %}
      Your print has finished. Duration: {{ '%02d:%02d:%02d' | format(h, m, s) }}
    data:
      tag: ofs_complete
      priority: high
      ttl: 0
      image: "/api/camera_proxy/{{ camera_entity_id }}"

mode: single