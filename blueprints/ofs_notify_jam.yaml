blueprint:
  name: OFS - Notify Filament Jam
  description: Send notification when a filament jam is detected
  domain: automation

  input:
    filament_sensor:
      name: Filament stopped - Open filament sensor
      selector:
        entity:
          domain: sensor

    current_layer_sensor:
      name: Current layer - Open filament sensor
      selector:
        entity:
          domain: sensor

    total_layers_sensor:
      name: Total layers - Open filament sensor
      selector:
        entity:
          domain: sensor

    hard_jam_sensor:
      name: Hard jam - Open filament sensor (%)
      selector:
        entity:
          domain: sensor

    soft_jam_sensor:
      name: Soft jam - Open filament sensor (%)
      selector:
        entity:
          domain: sensor

    camera_entity:
      name: Camera
      selector:
        entity:
          domain: camera

    notify_device:
      name: Mobile device
      selector:
        device:
          integration: mobile_app

trigger:
  - platform: state
    entity_id: !input filament_sensor
    to: "True"

condition: []

variables:
  current_layer_entity: !input current_layer_sensor
  total_layers_entity: !input total_layers_sensor
  hard_jam_entity: !input hard_jam_sensor
  soft_jam_entity: !input soft_jam_sensor
  camera_entity_id: !input camera_entity

action:
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: "Filament Jam Detected!"
    message: >-
      Print paused at layer {{ states(current_layer_entity) }}/{{
      states(total_layers_entity) }}.
      Hard jam: {{ states(hard_jam_entity) }}%,
      Soft jam: {{ states(soft_jam_entity) }}%
    data:
      tag: ofs_jam
      priority: high
      ttl: 0
      image: "/api/camera_proxy/{{ camera_entity_id }}"

mode: single